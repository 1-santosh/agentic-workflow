name: Issue Triage Agent

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub Agentic Workflows CLI
        run: |
          gh extension install github/gh-aw
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile Agent Workflow
        run: |
          gh aw compile issue-triage
          if [ ! -f .github/workflows/issue-triage.lock.yml ]; then
            echo "::error::Lock file was not created. Check compile output above."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Issue Triage Agent
        run: gh aw run .github/workflows/issue-triage.md
        env:
          ANTHROPIC_API_KEY: ${{ secrets.AGENTS_POC }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
